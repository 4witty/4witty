<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bio</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" href="assets/favico/icon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-black-rice">
    <div id="loading-screen">
        <div class="loader-circle"></div>
        <p class="loading-text">loading...</p>
    </div>

    <div id="background-container"></div>

    <audio id="myAudio" loop>
        <source src="assets/music/crashout.mp3" type="audio/mpeg">
    </audio>

    <div class="settings-panel" id="settings-panel">
        <button class="settings-btn" id="settings-btn">
            <i class="fas fa-cog"></i>
        </button>
        <div class="theme-menu" id="theme-menu">
            <button class="theme-option" data-theme="black-rice">
                <span class="theme-dot black-rice-dot"></span>
                Black Rice
            </button>
            <button class="theme-option" data-theme="akame">
                <span class="theme-dot akame-dot"></span>
                Akame
            </button>
            <button class="theme-option" data-theme="white-sunshine">
                <span class="theme-dot white-dot"></span>
                Sunshine
            </button>
        </div>
    </div>

    <section id="info-section" class="content-section active">
        <div class="card-container">
            <div class="card">
                <img id="profile-picture" src="assets/pfp/pfp.png" alt="avatar">
                <img id="avatar-frame" src="" alt="frame">
                <div class="user-description">
                    <p class="username">4witty</p>
                    <p class="subtitle">lazy research dev</p>
                    <div class="status-badge">researching</div>
                    <div class="bio-extra">
                        <p>16 yo</p>
                        <p>not for hire</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="skills-section" class="content-section">
        <div class="card-container">
            <div class="card">
                <h2 class="section-title"><i class="fas fa-pencil-alt"></i> skills</h2>
                <div class="skills-container">
                    <div class="skill-item">
                        <i class="fab fa-python"></i>
                        <div class="skill-info">
                            <span class="skill-name">python</span>
                            <div class="skill-bar">
                                <div class="skill-progress" style="width: 85%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <i class="fab fa-js"></i>
                        <div class="skill-info">
                            <span class="skill-name">javascript</span>
                            <div class="skill-bar">
                                <div class="skill-progress" style="width: 80%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="skill-item">
                        <i class="fas fa-code"></i>
                        <div class="skill-info">
                            <span class="skill-name">lua</span>
                            <div class="skill-bar">
                                <div class="skill-progress" style="width: 75%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="projects-section" class="content-section">
        <div class="card-container">
            <div class="card">
                <h2 class="section-title"><i class="fas fa-folder"></i> projects</h2>
                <div class="projects-container">
                    <div class="project-item">
                        <div class="project-icon"><i class="fas fa-cube"></i></div>
                        <span class="project-name">coming soon</span>
                    </div>
                    <div class="project-item">
                        <div class="project-icon"><i class="fas fa-cube"></i></div>
                        <span class="project-name">coming soon</span>
                    </div>
                    <div class="project-item">
                        <div class="project-icon"><i class="fas fa-cube"></i></div>
                        <span class="project-name">coming soon</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="links-section" class="content-section">
        <div class="card-container">
            <div class="card">
                <h2 class="section-title"><i class="fas fa-link"></i> links</h2>
                <div class="links-grid">
                    <a href="https://xbox.com/wittylunarqq" target="_blank" rel="noopener noreferrer" class="link-card">
                        <i class="fab fa-xbox"></i>
                        <span>xbox</span>
                    </a>
                    <a href="https://vk.com/wittylunar" target="_blank" rel="noopener noreferrer" class="link-card">
                        <i class="fab fa-vk"></i>
                        <span>vk</span>
                    </a>
                    <a href="https://github.com/4witty" target="_blank" rel="noopener noreferrer" class="link-card">
                        <i class="fab fa-github"></i>
                        <span>github</span>
                    </a>
                    <a href="https://on.soundcloud.com/TpX20DjO7cJMGcO1WK" target="_blank" rel="noopener noreferrer" class="link-card">
                        <i class="fab fa-soundcloud"></i>
                        <span>soundcloud</span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <section id="music-section" class="content-section">
        <div class="card-container">
            <div class="card">
                <h2 class="section-title"><i class="fas fa-music"></i> music player</h2>
                <div class="music-player">
                    <div class="album-art">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="track-info">
                        <p class="track-name">crashout.mp3</p>
                        <p class="track-artist">background music</p>
                    </div>
                    <button id="play-pause-btn" class="play-pause-btn">
                        <i class="fas fa-play"></i>
                    </button>
                    <div class="volume-control">
                        <i class="fas fa-volume-up"></i>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.1">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <nav class="bottom-nav">
        <button class="nav-item active" data-section="info-section">
            <i class="fas fa-home"></i>
            <span>info</span>
        </button>
        <button class="nav-item" data-section="skills-section">
            <i class="fas fa-pencil-alt"></i>
            <span>skills</span>
        </button>
        <button class="nav-item" data-section="projects-section">
            <i class="fas fa-folder"></i>
            <span>projects</span>
        </button>
        <button class="nav-item" data-section="links-section">
            <i class="fas fa-link"></i>
            <span>links</span>
        </button>
        <button class="nav-item" data-section="music-section">
            <i class="fas fa-music"></i>
            <span>music</span>
        </button>
    </nav>

    <script src="assets/js/title.js"></script>
    <script src="assets/js/discord.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/themes.js"></script>
</body>
</html>
